name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  deploy-n8n:
    name: Deploy n8n stack
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Swarm
        uses: alcharra/docker-deploy-action-go@v1
        with:
          # SSH Connection
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_key: ${{ secrets.SSH_KEY }}
          ssh_known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

          # Deployment Settings
          project_path: /opt/n8n
          deploy_file: n8n/n8n-stack.yml
          mode: stack
          stack_name: n8n

          # Network
          docker_network: n8n-net
          docker_network_driver: overlay
          docker_network_attachable: true

          # Registry Auth (GHCR)
          registry_host: ghcr.io
          registry_user: ${{ github.actor }}
          registry_pass: ${{ secrets.GITHUB_TOKEN }}

          # Rollback
          enable_rollback: true

  deploy-prometheus:
    name: Deploy Prometheus stack
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Swarm
        uses: alcharra/docker-deploy-action-go@v1
        with:
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_key: ${{ secrets.SSH_KEY }}
          ssh_known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

          project_path: /opt/prometheus
          deploy_file: prometheus/prometheus-stack.yaml
          mode: stack
          stack_name: prometheus

          docker_network: monitoring
          docker_network_driver: overlay
          docker_network_attachable: true

          registry_host: ghcr.io
          registry_user: ${{ github.actor }}
          registry_pass: ${{ secrets.GITHUB_TOKEN }}

          enable_rollback: true




#🔐 Шаг 2: Настройка GitHub Secrets
#В репозитории перейдите в Settings → Secrets and variables → Actions и добавьте:
#Secret Name Откуда взять
#SSH_HOST IP адрес вашего сервера
#SSH_USER Имя пользователя (например, snegzok)
#SSH_KEY  Содержимое приватного ключа (cat ~/.ssh/id_rsa)
#SSH_KNOWN_HOSTS  Вывод ssh-keyscan ваш-сервер
#Получить SSH_KNOWN_HOSTS:
#bash
#ssh-keyscan ваш-сервер.ru
#Скопируйте вывод целиком.
